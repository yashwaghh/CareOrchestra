<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareOrchestra — Patient Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #2563eb;
      --primary-dk: #1d4ed8;
      --surface:    #f8fafc;
      --card:       #ffffff;
      --border:     #e2e8f0;
      --text:       #1e293b;
      --muted:      #64748b;
      --bot-bg:     #f0f7ff;
      --user-bg:    #2563eb;
      --user-text:  #ffffff;
      --radius:     14px;
      --shadow:     0 4px 24px rgba(0,0,0,.08);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface);
      color: var(--text);
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 0 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 40px; height: 40px;
      background: var(--primary);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo svg { width: 22px; height: 22px; fill: #fff; }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -.3px; }
    header p  { font-size: .78rem; color: var(--muted); margin-top: 1px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      margin-left: auto;
      box-shadow: 0 0 0 3px rgba(34,197,94,.2);
    }

    /* ── Login Panel ── */
    #login-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .card p  { font-size: .875rem; color: var(--muted); margin-bottom: 24px; }
    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }
    .input-wrap input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
    }
    .input-wrap input:focus { border-color: var(--primary); }
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-primary:hover  { background: var(--primary-dk); }
    .btn-primary:active { transform: translateY(1px); }

    /* ── Chat Panel ── */
    #chat-panel { display: none; flex: 1; flex-direction: column; min-height: 0; }
    #chat-panel.active { display: flex; }

    .patient-bar {
      padding: 10px 0;
      font-size: .82rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .patient-bar span { color: var(--primary); font-weight: 600; }
    .patient-bar a {
      float: right;
      color: var(--muted);
      text-decoration: none;
      font-size: .78rem;
    }
    .patient-bar a:hover { color: var(--text); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700;
      flex-shrink: 0; align-self: flex-end;
    }
    .msg.bot  .avatar { background: var(--primary); color: #fff; }
    .msg.user .avatar { background: #e2e8f0; color: var(--muted); }

    .bubble {
      padding: 11px 15px;
      border-radius: 16px;
      font-size: .9rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.bot  .bubble { background: var(--bot-bg);  border-bottom-left-radius: 4px;  color: var(--text); }
    .msg.user .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; color: var(--user-text); }

    .msg-time {
      font-size: .7rem; color: var(--muted);
      margin-top: 3px;
      text-align: right;
    }
    .msg.bot .msg-time { text-align: left; }

    /* typing indicator */
    .typing-bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 16px;
    }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--primary); opacity: .4;
      animation: blink 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .2s; }
    .typing-bubble span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .15; transform: scale(1); }
      40%           { opacity: 1;   transform: scale(1.2); }
    }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 14px 0 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      font-size: .9rem;
      outline: none;
      resize: none;
      line-height: 1.4;
      max-height: 120px;
      transition: border-color .15s;
    }
    #msg-input:focus { border-color: var(--primary); }
    #send-btn {
      width: 44px; height: 44px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s;
    }
    #send-btn:hover  { background: var(--primary-dk); }
    #send-btn:active { transform: scale(.95); }
    #send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── Error toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #ef4444; color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: .85rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      animation: fadeUp .2s ease;
      z-index: 999;
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    </div>
    <div>
      <h1>CareOrchestra</h1>
      <p>Your personal health assistant</p>
    </div>
    <div class="status-dot" title="System online"></div>
  </header>

  <!-- Login Panel -->
  <div id="login-panel">
    <div class="card">
      <h2>Welcome back 👋</h2>
      <p>Enter your Patient ID to start your check-in</p>
      <form id="login-form">
        <div class="input-wrap">
          <input
            id="patient-id-input"
            type="text"
            placeholder="Patient ID (e.g. P001)"
            autocomplete="off"
            required
          />
        </div>
        <button type="submit" class="btn-primary">Start Check-in</button>
      </form>
    </div>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div class="patient-bar">
      Logged in as patient <span id="patient-label"></span>
      <a href="#" id="logout-link">Switch patient</a>
    </div>

    <div id="messages" role="log" aria-live="polite" aria-label="Conversation"></div>

    <div class="input-bar">
      <textarea
        id="msg-input"
        rows="1"
        placeholder="Type a message…"
        aria-label="Your message"
      ></textarea>
      <button id="send-btn" aria-label="Send message" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  // Auto-detect API base URL: same origin in production, or localhost:8000 for dev.
  const API_BASE = (() => {
    const { protocol, hostname, port } = window.location;
    if (hostname === 'localhost' || hostname === '127.0.0.1') {
      return `${protocol}//${hostname}:8000`;
    }
    return '';   // same origin (served by FastAPI)
  })();

  // ── State ───────────────────────────────────────────────────────────────────
  let patientId = '';
  let isBusy    = false;

  // ── Elements ─────────────────────────────────────────────────────────────────
  const loginPanel   = document.getElementById('login-panel');
  const chatPanel    = document.getElementById('chat-panel');
  const loginForm    = document.getElementById('login-form');
  const patientInput = document.getElementById('patient-id-input');
  const patientLabel = document.getElementById('patient-label');
  const logoutLink   = document.getElementById('logout-link');
  const messages     = document.getElementById('messages');
  const msgInput     = document.getElementById('msg-input');
  const sendBtn      = document.getElementById('send-btn');

  // ── Login ────────────────────────────────────────────────────────────────────
  loginForm.addEventListener('submit', e => {
    e.preventDefault();
    const id = patientInput.value.trim();
    if (!id) return;
    console.log("🟢 User entered patient_id:", id);  
    startChat(id);
  });

  logoutLink.addEventListener('click', e => {
    e.preventDefault();
    resetChat();
  });

  function startChat(id) {
    console.log("🟢 User entered patient_id:", id);  
    patientId = id;
    patientLabel.textContent = id;
    loginPanel.style.display = 'none';
    chatPanel.classList.add('active');
    msgInput.focus();
    updateSendBtn();
    appendBot(`Hello There! I'm your CareOrchestra health assistant. How are you feeling today?`);
  }

  function resetChat() {
    patientId = '';
    isBusy = false;
    messages.innerHTML = '';
    patientInput.value = '';
    chatPanel.classList.remove('active');
    loginPanel.style.display = '';
    patientInput.focus();
  }

  // ── Input auto-resize ────────────────────────────────────────────────────────
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
    updateSendBtn();
  });

  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  function updateSendBtn() {
    sendBtn.disabled = isBusy || !msgInput.value.trim();
  }

  // ── Send message ─────────────────────────────────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || isBusy) return;

    isBusy = true;
    updateSendBtn();
    msgInput.value = '';
    msgInput.style.height = 'auto';

    appendUser(text);
    const typingEl = appendTyping();

    try {
      console.log("📤 Sending request with patient_id:", patientId);
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, patient_id: patientId }),
      });

      typingEl.remove();

      if (!res.ok) {
        showToast(`Server error: ${res.status}`);
        isBusy = false;
        updateSendBtn();
        return;
      }

      const data = await res.json();

      if (data.status === 'error') {
        const detail = data.message || data.response?.message || 'Please try again.';
        appendBot(`Sorry, something went wrong: ${detail}`);
      } else {
        const reply =
          data?.response?.message_to_patient ||
          data?.response?.message ||
          data?.message ||
          'I received your message, but had trouble generating a response.';
        appendBot(reply);
      }
    } catch (err) {
      typingEl.remove();
      showToast('Could not reach the server. Is the API running?');
      console.error(err);
    }

    isBusy = false;
    updateSendBtn();
    msgInput.focus();
  }

  // ── Message helpers ──────────────────────────────────────────────────────────
  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendUser(text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg user';
    wrap.innerHTML = `
      <div>
        <div class="bubble">${escHtml(text)}</div>
        <div class="msg-time">${now()}</div>
      </div>
      <div class="avatar" aria-hidden="true">You</div>
    `;
    messages.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function appendBot(text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.innerHTML = `
      <div class="avatar" aria-hidden="true">CO</div>
      <div>
        <div class="bubble">${escHtml(text)}</div>
        <div class="msg-time">${now()}</div>
      </div>
    `;
    messages.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function appendTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.innerHTML = `
      <div class="avatar" aria-hidden="true">CO</div>
      <div class="bubble typing-bubble">
        <span></span><span></span><span></span>
      </div>
    `;
    messages.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function scrollBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }
</script>
</body>
</html>
