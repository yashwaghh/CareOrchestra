name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]

jobs:
  bq-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
      
      - name: Setup BigQuery Dataset + Seed Data
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          bash infra/scripts/setup_bigquery.sh $PROJECT_ID
  deploy:
    needs: bq-setup
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          # This uses the 'Keyless' bridge we just built
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # We use the full path directly to avoid newline errors
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/care-orchestra/care-orchestra:latest .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/care-orchestra/care-orchestra:latest

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GEMINI_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          gcloud run deploy care-orchestra \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/care-orchestra/care-orchestra:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars GCP_PROJECT_ID=$PROJECT_ID,GOOGLE_API_KEY=$GEMINI_KEY,GMAIL_USE_MOCK=true,USE_MOCK_DATA=false
          


